<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js r185 — Clustered Lighting + Procedural City</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #hud {
      position: fixed; bottom: 20px; left: 20px; z-index: 100;
      background: rgba(0,0,0,0.75); padding: 12px 16px; border-radius: 8px;
      font: 13px/1.6 -apple-system, BlinkMacSystemFont, monospace;
      color: #aaa; border: 1px solid rgba(255,255,255,0.08);
      pointer-events: none;
    }
    #hud b { color: #4fc3f7; }
    #hud .key { color: #ffa726; }
  </style>
</head>
<body>
<div id="hud">
  <b>Three.js r185</b> — WebGL Clustered Lighting<br>
  <span class="key">Drag</span> orbit · <span class="key">Scroll</span> zoom · <span class="key">Space</span> toggle lights<br>
  Lights: <span id="lightCount">0</span> · FPS: <span id="fps">0</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.min.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.5;
document.body.appendChild(renderer.domElement);

// ── Scene ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);

// Fog for depth
scene.fog = new THREE.FogExp2(0x050510, 0.015);

// ── Camera ──
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(15, 12, 20);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 2, 0);

// ── Ground ──
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a28,
  roughness: 0.6,
  metalness: 0.3,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ── Procedural Buildings ──
const buildingMats = [
  new THREE.MeshStandardMaterial({ color: 0x3a3a5e, roughness: 0.7, metalness: 0.2 }),
  new THREE.MeshStandardMaterial({ color: 0x36416e, roughness: 0.8, metalness: 0.1 }),
  new THREE.MeshStandardMaterial({ color: 0x2f5490, roughness: 0.6, metalness: 0.3 }),
  new THREE.MeshStandardMaterial({ color: 0x4a4a6e, roughness: 0.9, metalness: 0.0 }),
];

const buildings = [];
const rng = (min, max) => min + Math.random() * (max - min);

for (let i = 0; i < 60; i++) {
  const w = rng(1, 3);
  const h = rng(2, 16);
  const d = rng(1, 3);
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = buildingMats[Math.floor(Math.random() * buildingMats.length)];
  const mesh = new THREE.Mesh(geo, mat);

  const angle = Math.random() * Math.PI * 2;
  const dist = rng(4, 35);
  mesh.position.set(
    Math.cos(angle) * dist,
    h / 2,
    Math.sin(angle) * dist
  );
  mesh.rotation.y = Math.random() * Math.PI;
  scene.add(mesh);
  buildings.push(mesh);
}

// ── Window emissive panels (random lit windows) ──
for (let i = 0; i < 120; i++) {
  const b = buildings[Math.floor(Math.random() * buildings.length)];
  const wGeo = new THREE.PlaneGeometry(rng(0.15, 0.4), rng(0.15, 0.35));
  const hue = Math.random() > 0.7 ? 0.08 : 0.15; // warm or cool
  const wMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color().setHSL(hue, 0.6, 0.5),
    emissive: new THREE.Color().setHSL(hue, 0.8, 0.4),
    emissiveIntensity: 4,
    roughness: 0.3,
  });
  const wMesh = new THREE.Mesh(wGeo, wMat);
  // Position on building face
  const face = Math.floor(Math.random() * 4);
  const bh = b.geometry.parameters.height;
  const bw = b.geometry.parameters.width;
  const bd = b.geometry.parameters.depth;
  const yOff = rng(-bh * 0.4, bh * 0.4);
  const xOff = rng(-0.3, 0.3);

  if (face === 0) { wMesh.position.set(bw / 2 + 0.01, yOff, xOff); wMesh.rotation.y = Math.PI / 2; }
  else if (face === 1) { wMesh.position.set(-bw / 2 - 0.01, yOff, xOff); wMesh.rotation.y = -Math.PI / 2; }
  else if (face === 2) { wMesh.position.set(xOff, yOff, bd / 2 + 0.01); }
  else { wMesh.position.set(xOff, yOff, -bd / 2 - 0.01); wMesh.rotation.y = Math.PI; }

  b.add(wMesh);
}

// ── Clustered Lights (the r185 showcase) ──
const lights = [];
const lightHelpers = [];
const LIGHT_COUNT = 50;
let lightsEnabled = true;

const lightColors = [0x4fc3f7, 0xff7043, 0x66bb6a, 0xba68c8, 0xffd54f, 0xff8a80];

for (let i = 0; i < LIGHT_COUNT; i++) {
  const color = lightColors[Math.floor(Math.random() * lightColors.length)];
  const intensity = rng(3, 8);
  const light = new THREE.PointLight(color, intensity, rng(12, 30));

  const angle = Math.random() * Math.PI * 2;
  const dist = rng(3, 30);
  light.position.set(
    Math.cos(angle) * dist,
    rng(0.5, 8),
    Math.sin(angle) * dist
  );

  scene.add(light);
  lights.push(light);
}

document.getElementById('lightCount').textContent = LIGHT_COUNT;

// ── Ambient ──
scene.add(new THREE.AmbientLight(0x404060, 1.5));
// Key light from above
const keyLight = new THREE.DirectionalLight(0x8090c0, 2);
keyLight.position.set(10, 20, 5);
scene.add(keyLight);

// ── Toggle lights ──
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    lightsEnabled = !lightsEnabled;
    lights.forEach(l => l.visible = lightsEnabled);
  }
});

// ── Animation loop ──
const clock = new THREE.Clock();
let frameCount = 0;
let lastFpsUpdate = 0;

function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();

  // Animate lights — subtle float and color pulse
  for (let i = 0; i < lights.length; i++) {
    const l = lights[i];
    l.position.y += Math.sin(t * 0.5 + i) * 0.002;
    l.intensity = 4 + Math.sin(t * (0.3 + i * 0.01)) * 2;
  }

  controls.update();
  renderer.render(scene, camera);

  // FPS counter
  frameCount++;
  if (t - lastFpsUpdate > 0.5) {
    document.getElementById('fps').textContent = Math.round(frameCount / (t - lastFpsUpdate));
    frameCount = 0;
    lastFpsUpdate = t;
  }
}
animate();

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
